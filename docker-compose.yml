version: "3.8"

services:
  rate-limit-java8:
    build:
      context: ./rate-limit-java8
      dockerfile: Dockerfile
    container_name: rate-limit-java8
    ports:
      - "8081:8080"
    restart: unless-stopped

  rate-limit-java21:
    build:
      context: ./rate-limit-java21
      dockerfile: Dockerfile
    container_name: rate-limit-java21
    ports:
      - "8082:8080"
    restart: unless-stopped
